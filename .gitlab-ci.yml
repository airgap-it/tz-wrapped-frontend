variables:
  NAMESPACE: tz-wrapped-frontend

stages:
  - build
  - deploy

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: '/certs'
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --build-arg RUN_ENV=production -t $CI_REGISTRY_IMAGE/$NAMESPACE:$CI_COMMIT_SHA -t $CI_REGISTRY_IMAGE/$NAMESPACE:latest .
    - docker push $CI_REGISTRY_IMAGE/$NAMESPACE:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE/$NAMESPACE:latest
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == "master"

# Branches other than master: just verify the image builds (no push, no deploy).
build-branch:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: '/certs'
  script:
    - docker build -t $CI_REGISTRY_IMAGE/$NAMESPACE:$CI_COMMIT_SHA .
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH != "master"

deploy-ondemand:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | base64 -d | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -p 60022 -H $DEPLOY_SERVER >> ~/.ssh/known_hosts
  script:
    - |
      echo "Copying $DEPLOY_COMPOSE_FILE to $DEPLOY_SERVER:$DOCKER_COMPOSE_PATH/docker-compose.yml"
      scp -P 60022 "$DEPLOY_COMPOSE_FILE" "$DEPLOY_USER@$DEPLOY_SERVER:$DOCKER_COMPOSE_PATH/docker-compose.yml"
    - |
      ssh -p 60022 $DEPLOY_USER@$DEPLOY_SERVER "
        sudo -u papers bash -c '
          cd $DOCKER_COMPOSE_PATH &&
          sed -i \"s|^IMAGE_TAG=.*|IMAGE_TAG=$IMAGE_TAG|\" .env &&
          docker compose -f docker-compose.yml pull &&
          docker compose -f docker-compose.yml up -d &&
          sleep 10 &&
          docker compose -f docker-compose.yml ps -a
        '
        echo \"Deployment completed successfully\"
      "
  environment:
    name: production
  variables:
    IMAGE_TAG: $CI_COMMIT_SHA
    DEPLOY_SERVER: papers-ov-6.papers.tech
    DEPLOY_USER: papers
    DOCKER_COMPOSE_PATH: /home/papers/$NAMESPACE
    DEPLOY_COMPOSE_FILE: docker-compose.prd.yml
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
